<head>
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">

    <link rel="dns-prefetch" href="https://giscus.app">

    <link href="https://gmpg.org/xfn/11" rel="profile">

    {{ partial "head/feeds.html" . }}
