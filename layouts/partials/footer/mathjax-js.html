<!-- MathJax 4 Configuration -->
<script>
window.MathJax = {
  loader: {
    load: ['input/asciimath']
  },
  tex: {
    inlineMath: [['\\(', '\\)']],
    displayMath: [['\\[', '\\]']],
    tags: 'none'
  },
  asciimath: {
    delimiters: [['$', '$'], ['`', '`']]
  },
  options: {
    ignoreHtmlClass: 'nostem|nolatexmath|noasciimath',
    processHtmlClass: 'stemblock|latexmath|asciimath'
  },
  startup: {
    ready() {
      MathJax.startup.defaultReady();
      MathJax.startup.promise.then(() => {
        // Handle stemblock display mode (AsciiDoctor compatibility)
        const asciimath = MathJax._.input.asciimath.AsciiMath?.AsciiMath;
        if (asciimath) {
          const originalCompile = asciimath.Compile;
          asciimath.Compile = function(latex, display) {
            const node = this.parseMath(latex);
            // Check if parent has stemblock class for block display
            if (node && node.parentNode?.parentNode?.classList?.contains('stemblock')) {
              display = true;
            }
            return originalCompile.call(this, latex, display);
          };
        }
      });
    }
  }
};

/* Note: AsciiDoctor wraps AsciiMath delimiters ($) in separate <span> tags,
 * which MathJax cannot remove since they're in different parent elements.
 * A CSS rule in _asciidoctor.scss hides these delimiter spans using:
 *   span:not([class]):has(+ mjx-container),
 *   mjx-container + span:not([class]) { display: none; }
 * This hides classless spans immediately adjacent to MathJax containers.
 */
</script>
